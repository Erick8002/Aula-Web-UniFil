<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color:#f5f5f7;
        }

        img {
            width: 100px;
            height: 100px;
        }

        .card {
            background: #ffffff;
            width: 300px;
            height: 500px;
            margin: auto;
            border: 1px solid black;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #00122e;
            margin: 25px 0 10px;
            margin: 25px 0 10px;
        }

        p {
            margin-bottom: 15px;
        }

        ul {
            display: flex;
            flex-direction: column;
        }

        ul a {
            text-decoration: none;
            color: black;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <main>
        <div class="card">
            <img src="https://thumbs.dreamstime.com/b/%C3%ADcone-do-perfil-avatar-defeito-105356015.jpg" alt="Ícone de Perfil de Avatar Padrão">
            <h1>
                Erick Fukumoto
            </h1>
            <p>
                Desenvolvedor Front-End
            </p>
            <ul>
                <a href="https://github.com/Erick8002" target="_blank">GitHub</a>
                <a href="https://www.linkedin.com/in/erickfukumoto/" target="_blank">Linkedin</a>
                <a href="https://www.instagram.com/shin.pmnh/" target="_blank">Instagram</a>
            </ul>
        </div>
    </main>
</body>
</html>
