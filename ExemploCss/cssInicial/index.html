<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inicial</title>


    <style>


        body {
            background-color: lightyellow;
            font-family: Arial;
            text-align: center;
        }


        h1 {
            color: red;
            font-size: 40px;
        }


        p {
            color: blue;
            font-size: 20px;
        }


        img {
            border: 5px solid black;
        }


    </style>


</head>
<body>


    <h1>CSS Inicial</h1>


    <p>
        No início da Web, o CSS era utilizado principalmente
        para cores, fontes e tamanhos.
    </p>


    <p>
        As páginas eram simples e pouco organizadas visualmente.
    </p>


    <img
        src="imagens/web-antiga.jpg"
        alt="Imagem representando a web antiga"
        width="300"
    >


</body>
</html>
