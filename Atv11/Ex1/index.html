<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Taiko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>
            Galeria Taiko
        </h1>
    </header>
    <main>
        <div class="galeria">
            <div class="card roxo">
                <h3>
                    Nagado-daiko
                </h3>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdcDHo0cGgYfIDPdLKqCpKTMo0Yc-iK7stew&s" alt="Imagem de um Nagado-daiko">
            </div>
            <div class="card azul">
                <h3>
                    Shime-daiko
                </h3>
                <img src="https://static.mercdn.net/item/detail/orig/photos/m60558135154_1.jpg?1773533195" alt="Imagem de um Shime-daiko">
            </div>
            <div class="card verde">
                <h3>
                    Okedo-daiko
                </h3>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSj2ho2C7JRKM_zlk70ztzQkVSQDDa0Bp3FZA&s" alt="Imagem de um Okedo-daiko">
            </div>
            <div class="card vermelho">
                <h3>
                    Chappa
                </h3>
                <img src="https://taiko-shop.com/cdn/shop/products/1024_4ed679f4-a519-4489-86bd-f4e76c2a1a85_1024x.jpg?v=1579800103" alt="Imagem de uma Chappa">
            </div>
            <div class="card rosa">
                <h3>
                    Fue
                </h3>
                <img src="https://taiko-shop.com/cdn/shop/products/f56d2139483ba10df71596fc41a90595_394x.jpg?v=1579803042" alt="Imagem de um Fue">
            </div>
            <div class="card preto">
                <h3>
                    Bachi
                </h3>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYmefJnGPLkxQgLsDGWOqOVrkvCpIerEBlMQ&s" alt="Imagem de Bachi">
            </div>
        </div>
    </main>
</body>
</html>
